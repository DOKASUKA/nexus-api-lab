name: Deploy Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Safety gate: catch debug endpoints and hardcoded secrets ──────────────
  pre-deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for debug/reset endpoints
        run: |
          if grep -r '"/reset"' apis/; then
            echo "❌ Debug /reset endpoint found in source. Remove before deploying."
            exit 1
          fi
          echo "✅ No debug endpoints found"

      - name: Check for hardcoded secrets
        run: |
          # Detect patterns that look like hardcoded tokens (hex 32+, Bearer strings, sk_ prefixes)
          if grep -rE '(POLAR_ACCESS_TOKEN|CLOUDFLARE_API_TOKEN)\s*=\s*"[^$\{]' apis/ ||
             grep -rE '"(sk_|pk_|tok_)[a-zA-Z0-9_]{16,}"' apis/ ||
             grep -rE 'Authorization.*Bearer [a-zA-Z0-9_\-]{32,}' apis/; then
            echo "❌ Possible hardcoded secret detected in source. Use env vars instead."
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ── Sync Polar products (idempotent) ──────────────────────────────────────
  sync-polar-products:
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    continue-on-error: true  # Products already exist; sync failure should not block deploy
    steps:
      - uses: actions/checkout@v4

      - name: Sync Polar products
        env:
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORG_ID: ${{ secrets.POLAR_ORG_ID }}
        run: bash scripts/sync-polar-products.sh

  # ── Deploy Workers ────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    strategy:
      matrix:
        api: [hello, summarize, translate]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apis/${{ matrix.api }}
          secrets: |
            POLAR_ACCESS_TOKEN
            POLAR_ORG_ID
        env:
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORG_ID: ${{ secrets.POLAR_ORG_ID }}
