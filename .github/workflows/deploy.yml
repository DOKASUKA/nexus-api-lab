name: Deploy API Ecosystem

# mainブランチへのPush、かつ対象ディレクトリに変更があった時だけ実行
on:
  push:
    branches: [ main ]
    paths:
      - 'gateway/zuplo-gateway/**'
      - 'apis/**'
      - '.github/workflows/deploy.yml'

jobs:
  # 1. Zuplo Gateway のデプロイ
  deploy-zuplo:
    runs-on: ubuntu-latest
    # 共通のディレクトリ指定
    defaults:
      run:
        working-directory: gateway/zuplo-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Node 20の警告対策として最新の24を指定
          cache: 'npm'
          cache-dependency-path: gateway/zuplo-gateway/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Zuplo Test & Deploy
        env:
          ZUPLO_API_KEY: ${{ secrets.ZUPLO_API_KEY }}
        run: |
          # 1. サーバーへ送る前にローカル（CI環境）で設定ファイルを検証
          # ここでエラーが出れば、ログに具体的な「行数」や「理由」が表示されます
          npx @zuplo/cli test
          
          # 2. テストが成功した場合のみデプロイを実行
          npx @zuplo/cli deploy --project nexus-api-lab --api-key $ZUPLO_API_KEY

  # 2. Cloudflare Workers のデプロイ (3つ同時に実行)
  deploy-workers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # フォルダ名を配列で定義
        worker: [hello, summarize, translate]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apis/${{ matrix.worker }}"