openapi: "3.0.3"
info:
  title: Nexus Translate API
  version: "1.0.0"
  description: Text translation endpoint hosted on Cloudflare Workers.
servers:
  - url: https://nexus-translate-api.workers.dev
paths:
  /translate:
    post:
      operationId: translateText
      summary: Translates text to the specified language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - target_language
              properties:
                text:
                  type: string
                  example: hello world
                target_language:
                  type: string
                  example: ja
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - translated_text
                  - target_language
                properties:
                  translated_text:
                    type: string
                    example: こんにちは 世界
                  target_language:
                    type: string
                    example: ja
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
