openapi: "3.0.3"
info:
  title: Nexus Hello API
  version: "1.0.0"
  description: Simple hello endpoint hosted on Cloudflare Workers.
servers:
  - url: https://nexus-hello-api.workers.dev
paths:
  /hello:
    get:
      operationId: getHello
      summary: Returns a hello message
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    example: Hello from Nexus API Lab
