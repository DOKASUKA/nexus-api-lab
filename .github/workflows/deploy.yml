name: Deploy API Ecosystem

# mainブランチへのPush、かつ対象ディレクトリに変更があった時だけ実行
on:
  push:
    branches: [ main ]
    paths:
      - 'gateway/zuplo-gateway/**'
      - 'apis/**'

jobs:
  # 1. Zuplo Gateway のデプロイ
  deploy-zuplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gateway/zuplo-gateway/package-lock.json

      - name: Install dependencies
        working-directory: gateway/zuplo-gateway
        run: npm install

      - name: Deploy to Zuplo
        working-directory: gateway/zuplo-gateway
        # プロジェクト名 "nexus-api-lab" を明示してデプロイ
        run: npx zup deploy --project nexus-api-lab --api-key ${{ secrets.ZUPLO_API_KEY }}

  # 2. Cloudflare Workers のデプロイ (3つ同時に実行)
  deploy-workers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # フォルダ名を配列で定義
        worker: [hello, summarize, translate]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apis/${{ matrix.worker }}"